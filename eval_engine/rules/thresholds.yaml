# 룰 임계값 — 코드 밖(config), calibrate.py 가 분위수로 갱신.
# 스코프: default → product_type override → item_class override. (구체값이 우선)
# estimator 는 표준 robust 기본값(cold-start 시드). 표본 쌓이면 calibration 으로 대체.
version: ev1

default:
  cpk_warn: 1.33        # 주의 (업계 표준 시드)
  cpk_bad: 1.00         # 부적합 (절대 floor)
  outlier_ratio_warn: 0.02
  outlier_ratio_bad: 0.05
  spread_norm_warn: 0.18     # robust_sigma/(USL-LSL)
  modified_z: 3.5            # Iglewicz-Hoaglin outlier 컷
  skew_warn: 1.0            # |skew| 주의
  spec_margin_warn: 1.0     # σ 단위 여유 (작을수록 위험)
  edge_fail_ratio_warn: 2.0 # edge 영역 fail 집중 배수
  n_min: 20                 # min-n 가드 (고차모멘트 룰)

# 제품군별 override 예시 (필요 시 채움)
product_type:
  PMIC: {}
  MDDI: {}

# item_class 별 override 예시 (TRIM|CODE|18 형태)
item_class: {}
