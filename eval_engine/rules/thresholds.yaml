# 룰 임계값 — 코드 밖(config), calibrate.py 가 분위수로 갱신.
# 스코프: default → product_type override → item_class override. (구체값이 우선)
# estimator 는 표준 robust 기본값(cold-start 시드). 표본 쌓이면 calibration 으로 대체.
version: ev1

default:
  cpk_warn: 1.33        # 주의 (업계 표준 시드)
  cpk_bad: 1.00         # 부적합 (절대 floor)
  outlier_ratio_warn: 0.02
  outlier_ratio_bad: 0.05
  spread_norm_warn: 0.18     # robust_sigma/(USL-LSL)
  modified_z: 3.5            # Iglewicz-Hoaglin outlier 컷
  skew_warn: 1.0            # |skew| 주의
  spec_margin_warn: 1.0     # σ 단위 여유 (작을수록 위험)
  edge_fail_ratio_warn: 2.0 # edge 영역 fail 집중 배수
  n_min: 20                 # min-n 가드 (고차모멘트 룰)
  bimodality_warn: 0.555    # Sarle's bimodality coefficient (5/9 권장값)
  edge_region_pct: 0.8      # 반경 정규화 0~1 중 상위 20% = edge
  center_region_pct: 0.3    # 반경 정규화 하위 30% = center
  quadrant_imbalance_warn: 1.0
  mean_shift_warn: 0.30     # center_bias 이탈도(무차원 0~1) — 중심 치우침 컷
  cpk_trump_yield_floor: 0.7  # trump: cpk<cpk_bad AND yield<이값 → CRITICAL 강제
  site_cpk_delta_warn: 0.5  # site 간 cpk 편차 컷 (EQUIPMENT_SUSPECT)
  gross_yield_bad: 0.5      # yield 이 값 미만 → GROSS_FAIL
  code_edge_hit_warn: 0.05  # CODE/TRIM 레일(min/max) 포화 비율 컷 (CODE_RAIL)
  kurtosis_warn: 2.0        # excess kurtosis 컷 — heavy tail(간헐 spike) (HEAVY_TAIL)

# 제품군별 override 예시 (필요 시 채움)
product_type:
  PMIC: {}
  MDDI: {}

# calibrate.recalibrate 가 읽는 분위수 스펙 — {임계값 키: {feature 컬럼, 분위수, abs 여부}}.
# 여기 없는 키(cpk_warn 등 업계표준/이론값)는 보정 대상 아님.
calibration:
  min_n: 30                 # item_class 당 최소 표본(features 행 수) — 미만이면 skip
  quantiles:
    spread_norm_warn:   {feature: spread_norm,   q: 0.90}
    outlier_ratio_warn: {feature: outlier_ratio, q: 0.90}
    outlier_ratio_bad:  {feature: outlier_ratio, q: 0.97}
    skew_warn:          {feature: skewness,      q: 0.90, abs: true}
    kurtosis_warn:      {feature: kurtosis,      q: 0.90}

# item_class 별 override (TRIM|CODE|18 형태). calibrate 가 이 섹션을 재작성하므로
# 반드시 파일 마지막 섹션으로 유지할 것(위 주석/섹션은 보존됨).
item_class: {}
